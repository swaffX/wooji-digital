name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: RESEND_API_KEY,CONTACT_TO
          script: |
            printf "RESEND_API_KEY=%s\nCONTACT_TO=%s\n" "$RESEND_API_KEY" "$CONTACT_TO" > /root/wooji-digital/frontend/.env.local
            bash /root/wooji-digital/deploy.sh
          command_timeout: 20m
