name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTACT_TO: ${{ secrets.CONTACT_TO }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: RESEND_API_KEY,CONTACT_TO
          script: |
            cd /root/wooji-digital
            git pull origin main
            cd frontend
            npm install --production=false
            printf "RESEND_API_KEY=%s\nCONTACT_TO=%s\n" "$RESEND_API_KEY" "$CONTACT_TO" > .env.local
            rm -rf .next
            NODE_OPTIONS="--max-old-space-size=4096" npm run build
            pm2 stop wooji || true
            pm2 start wooji 2>/dev/null || pm2 restart wooji
            echo "Deploy tamamlandi: $(date)"
          command_timeout: 20m
